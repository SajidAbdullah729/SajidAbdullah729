<svg xmlns="http://www.w3.org/2000/svg" width="210" height="36" viewBox="0 0 210 36">

  <!-- Background -->
  <rect width="210" height="36" rx="8" fill="#0A66C2"/>

  <!-- LEFT: ICON -->
  <g>
    <!-- simple LinkedIn "in" style icon -->
    <rect x="14" y="12" width="10" height="12" fill="white"/>
    <circle cx="19" cy="10" r="2" fill="white"/>

    <!-- Text -->
    <text x="40" y="23"
          font-family="Arial, sans-serif"
          font-size="12"
          fill="white"
          font-weight="bold">
      LinkedIn
    </text>
  </g>

  <!-- RIGHT: PROFILE -->
  <g>
    <!-- separator -->
    <line x1="145" y1="8" x2="145" y2="28" stroke="rgba(255,255,255,0.3)" />

    <text x="165" y="23"
          font-family="Arial, sans-serif"
          font-size="12"
          fill="#eaf2ff"
          font-weight="bold">
      Profile
    </text>
  </g>

</svg>
