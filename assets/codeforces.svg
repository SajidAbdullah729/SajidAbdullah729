<svg xmlns="http://www.w3.org/2000/svg" width="210" height="36" viewBox="0 0 210 36">

  <!-- Background -->
  <rect width="210" height="36" rx="8" fill="#1F6FEB"/>

  <!-- LEFT: ICON -->
  <g>
    <!-- CF bars icon -->
    <rect x="14" y="18" width="3" height="10" fill="white"/>
    <rect x="19" y="14" width="3" height="14" fill="white"/>
    <rect x="24" y="20" width="3" height="8" fill="white"/>

    <!-- Name -->
    <text x="40" y="23"
          font-family="Arial, sans-serif"
          font-size="12"
          fill="white"
          font-weight="bold">
      Codeforces
    </text>
  </g>

  <!-- RIGHT: RATING -->
  <g>
    <!-- separator -->
    <line x1="145" y1="8" x2="145" y2="28" stroke="rgba(255,255,255,0.3)" />

    <!-- rating -->
    <text x="165" y="23"
          font-family="Arial, sans-serif"
          font-size="13"
          fill="#dbe9ff"
          font-weight="bold">
      1613
    </text>
  </g>

</svg>
