<svg xmlns="http://www.w3.org/2000/svg" width="260" height="45" viewBox="0 0 260 45">

  <!-- Background -->
  <rect width="260" height="45" rx="10" fill="#5B4638"/>

  <!-- LEFT: ICON + NAME -->
  <g>
    <!-- Chef icon -->
    <path d="M22 10 C18 10,16 14,18 16 C15 17,15 22,19 22 H25
             C29 22,29 17,26 16 C28 14,26 10,22 10 Z"
          fill="white"/>

    <rect x="18" y="22" width="8" height="6" rx="2" fill="white"/>

    <!-- Name -->
    <text x="50" y="28"
          font-family="Arial, sans-serif"
          font-size="14"
          fill="white"
          font-weight="bold">
      CodeChef
    </text>
  </g>

  <!-- RIGHT: ONLY NUMBER -->
  <g>
    <!-- divider -->
    <line x1="175" y1="12" x2="175" y2="33" stroke="rgba(255,255,255,0.3)" />

    <text x="195" y="29"
          font-family="Arial, sans-serif"
          font-size="16"
          fill="#f5e6d8"
          font-weight="bold">
      1886
    </text>
  </g>

</svg>
